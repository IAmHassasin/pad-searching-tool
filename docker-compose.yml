services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${HTTP_PUBLISH_PORT:-3000}:${HTTP_PORT:-3000}"
    environment:
      # Ghi đè .env máy host (thường START_HTTP=false cho npm local).
      SQLITE_PATH: /data/pad.db
      DATA_DIR: /data
      START_HTTP: "true"
      RUN_TRANSFORM: "true"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "3000"
      VANISH_AWOKEN_SQLITE_PATH: /seed/gamewith-vanish.sqlite
    volumes:
      - dadguide_working_sqlite:/data
      # File thật trên máy host (đường dẫn trái) phải tồn tại là FILE .sqlite — khớp với SQLITE_SNAPSHOT_PATH trong .env.
      - ./seed/dadguide.sqlite:/seed/dadguide.sqlite:ro
      - ./seed/gamewith-vanish.sqlite:/seed/gamewith-vanish.sqlite:ro

volumes:
  dadguide_working_sqlite:
